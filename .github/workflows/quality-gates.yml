name: Quality Gates

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint Codebase (Security & Style)
      run: npm run lint

    # - name: Dependency Vulnerability Scan
    #   run: npm audit --audit-level=high

    - name: Unit & Integration Tests (Vitest)
      run: npx vitest run --coverage
      # Blocks PR if coverage is below thresholds defined in vitest config

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright E2E & Accessibility Tests
      run: npx playwright test

    - name: AI Governance Validation
      run: |
        echo "Running mock AI validation script to ensure JSON schema compliance..."
        # python tests/ai_validation/test_schema.py

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          playwright-report/
          coverage/
